<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeRaider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <header>
    <h1>TypeRaider</h1>
    <p class="subtitle">Raid letterforms from images. Type with found glyphs.</p>
  </header>

  <main>
    <section id="upload-section">
      <label id="upload-area" for="file-input">
        <span class="upload-prompt">Drop an image here or click to upload</span>
        <canvas id="preview-canvas" hidden></canvas>
        <input type="file" id="file-input" accept="image/*" hidden>
      </label>
      <button id="random-page">or try a random page from <em>A Convenient Book of Alphabets</em></button>
      <div id="progress-bar" hidden>
        <div id="progress-fill"></div>
        <span id="progress-text"></span>
      </div>
    </section>

    <div id="workspace">
      <section id="repertoire-section">
        <h2>Repertoire <span id="glyph-count">(0 glyphs)</span></h2>
        <div id="repertoire-filters" hidden>
          <div class="filter-group">
            <label>Area <span id="area-value">0–0</span>px²</label>
            <canvas class="filter-histogram" id="hist-area" width="140" height="24"></canvas>
            <div class="dual-range">
              <input type="range" id="filter-area-min" min="0" max="1000" value="0">
              <input type="range" id="filter-area-max" min="0" max="1000" value="1000">
            </div>
          </div>
          <div class="filter-group">
            <label>Confidence <span id="confidence-value">0–0</span>%</label>
            <canvas class="filter-histogram" id="hist-confidence" width="140" height="24"></canvas>
            <div class="dual-range">
              <input type="range" id="filter-confidence-min" min="0" max="100" value="0">
              <input type="range" id="filter-confidence-max" min="0" max="100" value="100">
            </div>
          </div>
          <div class="filter-group">
            <label>Density <span id="density-value">0–0</span>%</label>
            <canvas class="filter-histogram" id="hist-density" width="140" height="24"></canvas>
            <div class="dual-range">
              <input type="range" id="filter-density-min" min="0" max="100" value="0">
              <input type="range" id="filter-density-max" min="0" max="100" value="100">
            </div>
          </div>
          <button id="clear-repertoire">Clear Repertoire</button>
        </div>
        <div id="repertoire-grid"></div>
      </section>

      <section id="editor-section">
        <h2>Type Editor</h2>
        <div id="type-editor" contenteditable="false" tabindex="0">
          <span class="placeholder">Upload an image to start raiding glyphs…</span>
        </div>
        <div id="editor-controls" hidden>
          <button id="lorem-btn">Fruity Lorem</button>
          <button id="clear-editor">Clear Text</button>
          <button id="export-editor">Export PNG</button>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <p>Made by <a href="https://github.com/eamonnbell">eamonnbell</a> using <a href="https://claude.ai/claude-code">Claude Code</a> (Claude Opus 4.6) and <a href="https://github.com/naptha/tesseract.js">Tesseract.js</a></p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
